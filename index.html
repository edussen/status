<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado del Sistema</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="https://imagenes.numart.com.co/faviconTemporal.ico">
  <style>
    :root {
      --bg-color: #f9fafb;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border-color: #f3f4f6;
      --border-dark: #e5e7eb;
      --color-green: #10b981;
      --color-yellow: #f59e0b;
      --color-red: #ef4444;

      --announce-green-bg: #ecfdf5;
      --announce-green-border: #10b981;
      --announce-green-text: #065f46;
      --announce-yellow-bg: #fffbeb;
      --announce-yellow-border: #fbbf24;
      --announce-yellow-text: #b45309;
      --announce-red-bg: #fef2f2;
      --announce-red-border: #ef4444;
      --announce-red-text: #991b1b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
    }

    .header video {
      width: 180px;
      height: auto;
    }

    .main-container {
      width: 100%;
      max-width: 850px;
    }

    .announcement-card {
      border-radius: 8px;
      border: 1px solid;
      padding: 24px;
      margin-bottom: 30px;
      background-color: var(--announce-green-bg);
      border-color: var(--announce-green-border);
      color: var(--announce-green-text);
      transition: all 0.3s;
    }

    .announcement-card.warning {
      background-color: var(--announce-yellow-bg);
      border-color: var(--announce-yellow-border);
      color: var(--announce-yellow-text);
    }

    .announcement-card.danger {
      background-color: var(--announce-red-bg);
      border-color: var(--announce-red-border);
      color: var(--announce-red-text);
    }

    .announcement-header {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* --- ESTILOS DE LOS TAGS --- */
    .tags-container {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .status-tag {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.05);
      cursor: pointer;
    }

    /* Ocultar detalles y tags si todo está bien */
    .success .incident-details,
    .success .tags-container {
      display: none;
    }

    .incident-details {
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      padding-top: 16px;
      display: none;
    }

    .announcement-card.warning .incident-details,
    .announcement-card.danger .incident-details {
      display: block;
    }

    .incident-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 8px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .incident-msg {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-dark);
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 10px 0;
      font-size: 16px;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-weight: 500;
    }

    .tab-btn.active {
      color: var(--text-main);
      border-bottom: 2px solid var(--text-main);
    }

    .tab-content {
      display: none;
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 30px;
      border: 1px solid var(--border-dark);
    }

    .tab-content.active {
      display: block;
    }

    .header h1 {
      font-size: 20px;
      color: var(--text-main);
      margin: 0 0 25px 0;
    }

    .service-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .service-card {
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      overflow: hidden;
      background-color: var(--card-bg);
      cursor: pointer;
    }

    .service-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    .service-title-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .service-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text-main);
    }

    .service-components-count {
      font-size: 12px;
      color: var(--text-muted);
      background: #f3f4f6;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .service-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .icon-circle {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      font-size: 9px;
    }

    .green {
      color: var(--color-green);
    }

    .yellow {
      color: var(--color-yellow);
    }

    .red {
      color: var(--color-red);
    }

    .chevron {
      color: var(--text-muted);
      font-size: 12px;
      margin-left: 10px;
      transition: transform 0.3s;
    }

    .service-card.open .chevron {
      transform: rotate(180deg);
    }

    .service-body {
      display: none;
      padding: 0 20px 20px 20px;
      border-top: 1px solid var(--border-dark);
    }

    .service-card.open .service-body {
      display: block;
    }

    .explanation {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      line-height: 1.5;
    }

    .explanation.yellow {
      background-color: #fffbeb;
      color: #b45309;
      border: 1px solid #fef3c7;
    }

    .explanation.red {
      background-color: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fee2e2;
    }

    .components-list {
      margin-top: 15px;
      border: 1px solid var(--border-dark);
      border-radius: 6px;
      overflow: hidden;
    }

    .component-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 15px;
      font-size: 13px;
      border-bottom: 1px solid var(--border-dark);
      background: #fafafa;
    }

    .component-item:last-child {
      border-bottom: none;
    }

    .comp-name {
      color: var(--text-main);
      font-weight: 500;
    }

    .comp-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .uptime-bars {
      display: flex;
      gap: 4px;
      height: 35px;
      margin-top: 15px;
    }

    .bar {
      flex: 1;
      border-radius: 2px;
      background-color: var(--color-green);
    }

    .history-item {
      display: flex;
      margin-bottom: 30px;
    }

    .history-date {
      width: 120px;
      flex-shrink: 0;
      font-size: 14px;
      color: var(--text-muted);
    }

    .history-content {
      flex-grow: 1;
      padding-left: 15px;
      border-left: 3px solid transparent;
    }

    .history-content.yellow {
      border-left-color: var(--color-yellow);
    }

    .history-content.red {
      border-left-color: var(--color-red);
    }

    .history-content.green {
      border-left-color: var(--color-green);
    }

    .history-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .history-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="main-container">
    <div class="header"><a href="https://numart.com.co">
        <video id="videoLoader" autoplay muted playsinline>
          <source src="http://imagenes.numart.com.co/Animacion%20NUMART.mp4" type="video/mp4">
          Tu navegador no soporta video.
        </video></a>
    </div>

    <div id="statusAnnounce" class="announcement-card">
      <div class="announcement-header">
        <i id="announceIcon" class="fa-solid fa-circle-check"></i>
        <span id="announceTitle">Cargando estado...</span>
      </div>

      <div id="announceTags"></div>

      <div class="incident-details" id="announceDetails"></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="openTab('status')">System status</button>
      <button class="tab-btn" onclick="openTab('history')">History</button>
    </div>

    <div id="status" class="tab-content active">
      <div class="header" style="margin-bottom: 25px;">
        <h1 style="margin: 0;">Estado de los Sistemas</h1>
      </div>
      <div class="service-list" id="publicServiceList">
        <p style="text-align: center; color: #6b7280;">Cargando servicios...</p>
      </div>
    </div>

    <div id="history" class="tab-content">
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://bitter-butterfly-8bc2.mrluki4656.workers.dev"; // TU URL

    function openTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    function toggleAccordion(element) { element.classList.toggle('open'); }

    function formatDate(isoString) {
      const d = new Date(isoString);
      return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function translateStatus(statusStr) {
      if (statusStr === 'green') return 'Operacional';
      if (statusStr === 'yellow') return 'Inconsistencias';
      return 'Fuera de Servicio';
    }

    function getIcon(statusStr) {
      if (statusStr === 'green') return 'fa-check';
      if (statusStr === 'yellow') return 'fa-exclamation';
      return 'fa-minus';
    }

    async function loadData() {
      try {
        const res = await fetch(`${WORKER_URL}/api/data`);
        const services = await res.json();
        renderUI(services);
      } catch (err) {
        console.error(err);
        document.getElementById('announceTitle').innerText = "Error al conectar con el servidor";
      }
    }

    function renderUI(services) {
      const hasRed = services.some(s => s.status === 'red');
      const hasYellow = services.some(s => s.status === 'yellow');
      const announceCard = document.getElementById('statusAnnounce');

      // 1. Configurar color y título principal
      if (hasRed) {
        announceCard.className = 'announcement-card danger';
        document.getElementById('announceIcon').className = 'fa-solid fa-circle-xmark';
        document.getElementById('announceTitle').innerText = 'Falla mayor del sistema';
      } else if (hasYellow) {
        announceCard.className = 'announcement-card warning';
        document.getElementById('announceIcon').className = 'fa-solid fa-triangle-exclamation';
        document.getElementById('announceTitle').innerText = 'Actualmente experimentamos inconsistencias';
      } else {
        announceCard.className = 'announcement-card success';
        document.getElementById('announceIcon').className = 'fa-solid fa-circle-check';
        document.getElementById('announceTitle').innerText = 'Todos los sistemas operacionales';
      }

      // 2. Filtrar servicios afectados para los tags
      const affectedServices = services.filter(s => s.status !== 'green');
      
      if (affectedServices.length > 0) {
        // Generar los Tags
        const tagsHtml = `<div class="tags-container">` + 
            affectedServices.map(s => `<span class="status-tag">${s.name}</span>`).join('') + 
        `</div>`;
        document.getElementById('announceTags').innerHTML = tagsHtml;

        // Generar el detalle con el último mensaje del primer servicio afectado
        const latestMsg = affectedServices[0].incident_history[0]?.message || "Investigando el problema...";
        document.getElementById('announceDetails').innerHTML = `
            <div class="incident-title">
                <i class="fa-solid fa-triangle-exclamation" style="font-size: 12px; color: inherit;"></i>
                Detalles del incidente
            </div>
            <div class="incident-msg">${latestMsg}</div>
        `;
      } else {
        // Limpiar si todo está verde
        document.getElementById('announceTags').innerHTML = '';
        document.getElementById('announceDetails').innerHTML = '';
      }

      // 3. Renderizar lista de servicios
      const listDiv = document.getElementById('publicServiceList');
      listDiv.innerHTML = '';
      let historyHtml = '';

      services.forEach(srv => {
        let statusText = translateStatus(srv.status);
        let icon = getIcon(srv.status);
        let isOpen = srv.status !== 'green' ? 'open' : '';

        let componentsHtml = '';
        let compBadge = '';
        
        if (srv.components && srv.components.length > 0) {
          compBadge = `<span class="service-components-count">${srv.components.length} componentes</span>`;

          let compItems = srv.components.map(comp => `
            <div class="component-item">
                <span class="comp-name">${comp.name}</span>
                <span class="comp-status ${comp.status}">
                    <i class="fa-solid ${getIcon(comp.status)}"></i> ${translateStatus(comp.status)}
                </span>
            </div>
          `).join('');

          componentsHtml = `<div class="components-list">${compItems}</div>`;
        }

        let msgHtml = srv.status !== 'green'
          ? `<div class="explanation ${srv.status}"><strong>Incidente:</strong> ${srv.incident_history[0]?.message || 'Problema reportado.'}</div>`
          : '';

        let barsHtml = srv.status === 'green' ? `<div class="uptime-bars">${Array(30).fill('<div class="bar"></div>').join('')}</div>` : '';

        listDiv.innerHTML += `
            <div class="service-card ${isOpen}" onclick="toggleAccordion(this)">
                <div class="service-header">
                    <div class="service-title-group">
                        <div class="service-name">${srv.name}</div>
                        ${compBadge}
                    </div>
                    <div class="service-status ${srv.status}">
                        <div class="icon-circle ${srv.status}"><i class="fa-solid ${icon}"></i></div> 
                        ${statusText} <i class="fa-solid fa-chevron-down chevron"></i>
                    </div>
                </div>
                <div class="service-body" onclick="event.stopPropagation()">
                    ${msgHtml}
                    ${componentsHtml}
                    ${barsHtml}
                </div>
            </div>
        `;

        // 4. Acumular historial
        srv.incident_history.forEach(inc => {
          historyHtml += `
            <div class="history-item">
                <div class="history-date">${formatDate(inc.date)}</div>
                <div class="history-content ${inc.status}">
                    <div class="history-title">${srv.name}</div>
                    <div class="history-desc">${inc.message}</div>
                </div>
            </div>
          `;
        });
      });

      document.getElementById('historyList').innerHTML = historyHtml || "<p>No hay incidentes recientes.</p>";
    }

    document.addEventListener("DOMContentLoaded", loadData);
  </script>
  <script>
    const video = document.getElementById("videoLoader");

    setInterval(() => {
      video.currentTime = 0; // reinicia el video
      video.play();
    }, 15000); 
  </script>
</body>

</html>
